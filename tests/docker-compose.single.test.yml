services:
  teamclaw-single:
    image: ${OPENCLAW_IMAGE:-openclaw:teamclaw-test}
    platform: ${OPENCLAW_PLATFORM:-linux/amd64}
    container_name: tc-single
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: Asia/Shanghai
    volumes:
      - ${TEAMCLAW_SINGLE_CONFIG_DIR:?TEAMCLAW_SINGLE_CONFIG_DIR is required}:/home/node/.openclaw
    ports:
      - "${CONTROLLER_PORT:-9527}:9527"
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--allow-unconfigured",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9527/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    init: true
